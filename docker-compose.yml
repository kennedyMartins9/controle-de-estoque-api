services:
  db:
    image: mysql:8.0
    container_name: estoque-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: estoque
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - estoque-network

  app:
    build: .
    container_name: estoque-api
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/estoque?createDatabaseIfNotExist=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - estoque-network

networks:
  estoque-network:
    driver: bridge

volumes:
  db_data:
